<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Authoring Panel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <!-- PIN Screen -->
        <div id="pin-screen">
            <section class="text">
                <h1>Secure Entry</h1>
                <p>Please enter the passcode PIN to access the authoring panel.</p>
                <p>
                    <input type="password" id="pin-input" maxlength="4" placeholder="••••" autocomplete="off" autofocus>
                </p>
                <p id="pin-error">Incorrect passcode</p>
            </section>
        </div>

        <!-- Workspace Screen -->
        <div id="workspace-screen">
            <!-- Success view -->
            <div id="success-view">
                <section class="text">
                    <h1>Post Created Successfully!</h1>
                    <p id="success-log-summary">Files have been updated on GitHub.</p>
                    <p>
                        <button type="button" onclick="resetForm()">Create Another Post</button>
                    </p>
                </section>
            </div>

            <!-- Form -->
            <form id="post-form" onsubmit="handleFormSubmit(event)">
                <section class="text">
                    <h1>Author Panel</h1>
                    <div id="connection-status-box">
                        <strong>Status:</strong> <span id="conn-text">Checking...</span>

                        <div id="token-input-group">
                            <p>Enter GitHub Personal Access Token (PAT):</p>
                            <input type="password" id="github-pat-input" placeholder="ghp_xxxxxxxxxxxx">
                            <p>
                                <button type="button" onclick="saveGitHubToken()">Save Token</button>
                            </p>
                        </div>
                        <p>
                            <button type="button" id="btn-clear-token" onclick="clearGitHubToken()">Disconnect / Clear
                                Token</button>
                        </p>
                    </div>
                </section>

                <section class="text">
                    <h2>New Post</h2>

                    <p>
                        <label><strong>Post To:</strong></label><br>
                        <input type="radio" id="type-research" name="post-type" value="research" checked
                            onchange="setPostType('research')">
                        <label for="type-research">Research</label>
                        &nbsp;&nbsp;
                        <input type="radio" id="type-pottery" name="post-type" value="pottery"
                            onchange="setPostType('pottery')">
                        <label for="type-pottery">Pottery</label>
                    </p>

                    <p>
                        <label for="post-date"><strong>Post Date:</strong></label><br>
                        <input type="text" id="post-date" placeholder="e.g. July 1, 2026" required>
                    </p>

                    <p>
                        <label for="photo-input"><strong>Photo:</strong></label><br>
                        <input type="file" id="photo-input" accept="image/*" onchange="handlePhotoSelect(event)">
                    </p>

                    <div id="preview-group">
                        <img id="image-preview" alt="Selected photo preview">
                        <p>
                            <button type="button" onclick="removePhoto(event)">Remove Photo</button>
                        </p>
                    </div>

                    <p id="alt-group">
                        <label for="photo-alt"><strong>Image Description (Alt Text):</strong></label><br>
                        <input type="text" id="photo-alt" placeholder="Alt text describing the image...">
                    </p>

                    <p>
                        <label for="post-body"><strong>Content Body:</strong></label><br>
                        <textarea id="post-body"
                            placeholder="Write your post content here... Supports multiple paragraphs (separated by double newlines)"
                            required></textarea>
                    </p>

                    <p>
                        <label><strong>Log Output:</strong></label><br>
                        <textarea id="console-output" readonly></textarea>
                    </p>

                    <p>
                        <button type="submit" id="btn-submit-post" disabled>Publish Post</button>
                    </p>
                </section>
            </form>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Go Back Home...</a></li>
            </ul>
        </nav>
    </main>

    <script>
        const CORRECT_PIN = "7918";
        let currentPostType = 'research';
        let selectedFile = null;

        // Initialize display states and styling on load
        document.addEventListener('DOMContentLoaded', () => {
            applyBaseStyling();
            setupPinInput();
            prefillDate();
            updateConnectionUI();
        });

        // Apply functional CSS properties via JS to keep HTML free of styles
        function applyBaseStyling() {
            // Hide hidden elements initially
            document.getElementById('pin-error').style.display = 'none';
            document.getElementById('pin-error').style.color = 'red';
            document.getElementById('pin-error').style.fontWeight = 'bold';

            document.getElementById('workspace-screen').style.display = 'none';
            document.getElementById('success-view').style.display = 'none';
            document.getElementById('preview-group').style.display = 'none';
            document.getElementById('alt-group').style.display = 'none';

            const statusBox = document.getElementById('connection-status-box');
            statusBox.style.border = '1px solid #aaa';
            statusBox.style.background = '#eaeaea';
            statusBox.style.padding = '10px';
            statusBox.style.margin = '10px 0';
            statusBox.style.textAlign = 'left';

            // Make inputs look styled & aligned
            const textInputs = document.querySelectorAll('input[type="text"], textarea, input[type="password"]');
            textInputs.forEach(el => {
                el.style.width = '100%';
                el.style.boxSizing = 'border-box';
                el.style.padding = '8px';
                el.style.fontFamily = 'inherit';
            });

            const pinEl = document.getElementById('pin-input');
            pinEl.style.fontSize = '20px';
            pinEl.style.padding = '5px';
            pinEl.style.textAlign = 'center';
            pinEl.style.width = '120px';

            const consoleEl = document.getElementById('console-output');
            consoleEl.style.height = '100px';
            consoleEl.style.fontFamily = 'monospace';
            consoleEl.style.fontSize = '11px';
            consoleEl.style.background = '#f0f0f0';
            consoleEl.value = 'Ready...';
        }

        // Prefill current date
        function prefillDate() {
            const dateInput = document.getElementById('post-date');
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            dateInput.value = new Date().toLocaleDateString('en-US', options);
        }

        // Passcode Lock listener
        function setupPinInput() {
            const pinInput = document.getElementById('pin-input');
            pinInput.addEventListener('input', (e) => {
                if (e.target.value.length === 4) {
                    verifyPin();
                }
            });
        }

        function verifyPin() {
            const pinInput = document.getElementById('pin-input');
            if (pinInput.value === CORRECT_PIN) {
                document.getElementById('pin-screen').style.display = 'none';
                document.getElementById('workspace-screen').style.display = 'block';
            } else {
                const error = document.getElementById('pin-error');
                error.style.display = 'block';
                pinInput.value = '';
                pinInput.focus();

                setTimeout(() => {
                    error.style.display = 'none';
                }, 2000);
            }
        }

        // Token management functions
        function saveGitHubToken() {
            const patVal = document.getElementById('github-pat-input').value.trim();
            if (patVal) {
                localStorage.setItem('github_pat', patVal);
                log("GitHub Token saved to browser storage.");
                updateConnectionUI();
            } else {
                alert("Please enter a token first.");
            }
        }

        function clearGitHubToken() {
            localStorage.removeItem('github_pat');
            document.getElementById('github-pat-input').value = '';
            log("GitHub Token cleared from browser storage.");
            updateConnectionUI();
        }

        function updateConnectionUI() {
            const pat = localStorage.getItem('github_pat');
            const statusText = document.getElementById('conn-text');
            const submitBtn = document.getElementById('btn-submit-post');
            const tokenInputGroup = document.getElementById('token-input-group');
            const btnClearToken = document.getElementById('btn-clear-token');

            if (pat) {
                statusText.textContent = "Ready (GitHub API)";
                submitBtn.disabled = false;
                tokenInputGroup.style.display = 'none';
                btnClearToken.style.display = 'inline-block';
            } else {
                statusText.textContent = "Token Setup Required";
                submitBtn.disabled = true;
                tokenInputGroup.style.display = 'block';
                btnClearToken.style.display = 'none';
            }
        }

        // Toggle Post Destination
        function setPostType(type) {
            currentPostType = type;
            log(`Switched target page to ${type}.html`);
        }

        // Photo file selection
        function handlePhotoSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            selectedFile = file;

            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('preview-group').style.display = 'block';
                document.getElementById('alt-group').style.display = 'block';
                document.getElementById('photo-alt').required = true;
            };
            reader.readAsDataURL(file);
            log(`Selected image file: ${file.name}`);
        }

        function removePhoto(event) {
            if (event) event.stopPropagation();
            selectedFile = null;
            document.getElementById('photo-input').value = '';
            document.getElementById('preview-group').style.display = 'none';
            document.getElementById('alt-group').style.display = 'none';
            document.getElementById('photo-alt').required = false;
            document.getElementById('photo-alt').value = '';
            log("Removed image selection.");
        }

        // Action Logger
        function log(message, isError = false) {
            const output = document.getElementById('console-output');
            const time = new Date().toLocaleTimeString();
            output.value += `\n[${time}] ${message}`;
            output.scrollTop = output.scrollHeight;
        }

        // GitHub API Publish logic
        async function publishToGitHub(dateVal, bodyText, imgFilename, altText) {
            const pat = localStorage.getItem('github_pat');
            if (!pat) throw new Error("GitHub Personal Access Token is missing.");

            const username = "aquall";
            const repo = "aquall.github.io";
            const baseUrl = `https://api.github.com/repos/${username}/${repo}/contents`;

            let finalImgFilename = imgFilename;

            // 1. Upload image if selected
            if (selectedFile) {
                log(`Uploading image ${imgFilename} to GitHub...`);
                const readerData = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => reject(reader.error);
                    reader.readAsDataURL(selectedFile);
                });
                const base64Content = readerData.split(',')[1];

                // Suffix collision check: check if file exists on GitHub
                let finalName = getMMDDYYName(dateVal, selectedFile.name);
                let exists = true;
                let counter = 0;

                while (exists) {
                    try {
                        const checkRes = await fetch(`${baseUrl}/images/${finalName}`, {
                            headers: { 'Authorization': `Bearer ${pat}` }
                        });
                        if (checkRes.status === 404) {
                            exists = false;
                        } else if (checkRes.ok) {
                            counter++;
                            const parts = imgFilename.split('.');
                            const ext = parts.pop();
                            const base = parts.join('.');
                            finalName = `${base}_${counter}.${ext}`;
                        } else {
                            exists = false;
                        }
                    } catch (e) {
                        exists = false;
                    }
                }
                finalImgFilename = finalName;

                const imgUploadRes = await fetch(`${baseUrl}/images/${finalImgFilename}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${pat}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Upload image ${finalImgFilename} via Secret Panel`,
                        content: base64Content
                    })
                });

                if (!imgUploadRes.ok) {
                    const errText = await imgUploadRes.text();
                    throw new Error(`Failed to upload image: ${errText}`);
                }
                log(`Image uploaded successfully as images/${finalImgFilename}`);
            }

            // 2. Fetch target HTML page and get its content + SHA
            const targetPage = `${currentPostType}.html`;
            log(`Fetching ${targetPage} from GitHub...`);
            const pageRes = await fetch(`${baseUrl}/${targetPage}`, {
                headers: { 'Authorization': `Bearer ${pat}` }
            });

            if (!pageRes.ok) {
                throw new Error(`Failed to fetch ${targetPage} from GitHub. Check repo settings and token.`);
            }

            const pageData = await pageRes.json();
            const sha = pageData.sha;

            // Decode base64 content safely supporting UTF-8
            const base64Html = pageData.content.replace(/\s/g, '');
            const decodedHtml = decodeURIComponent(escape(atob(base64Html)));

            // 3. Inject the post
            log("Injecting post in chronological order...");
            const newPostHTML = generatePostHTML(dateVal, bodyText, finalImgFilename, altText);
            const updatedHTML = insertPostIntoHTML(decodedHtml, newPostHTML, dateVal);

            // 4. Push updated HTML back to GitHub
            log(`Pushing updated ${targetPage} to GitHub...`);
            const encodedHtml = btoa(unescape(encodeURIComponent(updatedHTML)));

            const updateRes = await fetch(`${baseUrl}/${targetPage}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${pat}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `New post added to ${targetPage} via Secret Panel`,
                    content: encodedHtml,
                    sha: sha
                })
            });

            if (!updateRes.ok) {
                const errText = await updateRes.text();
                throw new Error(`Failed to update ${targetPage} on GitHub: ${errText}`);
            }

            log(`Successfully published post on GitHub!`);
            return finalImgFilename;
        }

        // Form Submit handler
        async function handleFormSubmit(event) {
            event.preventDefault();

            const pat = localStorage.getItem('github_pat');
            if (!pat) {
                log("Error: GitHub token is not configured.", true);
                alert("Please configure a GitHub token first.");
                return;
            }

            const submitBtn = document.getElementById('btn-submit-post');
            submitBtn.disabled = true;
            submitBtn.textContent = "Publishing...";

            try {
                const dateVal = document.getElementById('post-date').value.trim();
                const bodyText = document.getElementById('post-body').value.trim();
                const altText = document.getElementById('photo-alt').value.trim();

                const finalImgName = await publishToGitHub(dateVal, bodyText, selectedFile ? selectedFile.name : null, altText);
                document.getElementById('success-log-summary').textContent = `New post successfully pushed to GitHub! Changes will be live in 1-2 minutes. Image: images/${finalImgName || 'N/A'}`;

                document.getElementById('post-form').style.display = 'none';
                document.getElementById('success-view').style.display = 'block';
            } catch (err) {
                log(`Error: ${err.message}`, true);
                console.error(err);
                alert(`Error while publishing: ${err.message}`);
                submitBtn.disabled = false;
                submitBtn.textContent = "Publish Post";
            }
        }

        // Form Resetter
        function resetForm() {
            document.getElementById('post-body').value = '';
            removePhoto();
            prefillDate();

            document.getElementById('success-view').style.display = 'none';
            document.getElementById('post-form').style.display = 'block';

            document.getElementById('btn-submit-post').disabled = false;
            document.getElementById('btn-submit-post').textContent = "Publish Post";
            log("Form reset. Ready for next post.");
        }

        // Helper string/HTML manipulation logic
        function getMMDDYYName(dateStr, originalFilename) {
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) {
                return originalFilename.replace(/[^a-zA-Z0-9.-]/g, '_');
            }
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const yy = String(date.getFullYear()).slice(-2);
            const parts = originalFilename.split('.');
            const ext = parts.pop().toLowerCase();
            return `${mm}${dd}${yy}.${ext}`;
        }

        function generatePostHTML(dateStr, bodyText, imgFilename, imgAlt) {
            const paragraphs = bodyText.split(/\n\s*\n/);
            let paragraphsHTML = "";
            for (const p of paragraphs) {
                const trimmed = p.trim();
                if (trimmed) {
                    const escaped = trimmed
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;")
                        .replace(/\n/g, '\n                ');
                    paragraphsHTML += `            <p>\n                ${escaped}\n            </p>\n`;
                }
            }

            let html = `        <section class="text">\n`;
            html += `            <h2>${dateStr}</h2>\n`;
            html += paragraphsHTML;
            html += `        </section>\n`;
            if (imgFilename) {
                const escapedAlt = imgAlt.replace(/"/g, "&quot;");
                html += `\n        <img src="images/${imgFilename}" alt="${escapedAlt}">\n`;
            }
            html += `\n\n`; // double empty line spacer
            return html;
        }

        function insertPostIntoHTML(htmlContent, newPostHTML, newPostDateStr) {
            const newDate = new Date(newPostDateStr);
            if (isNaN(newDate.getTime())) {
                throw new Error("Invalid date input.");
            }

            const sectionRegex = /<section\s+class="text">/gi;
            const navRegex = /<nav>/gi;

            const sections = [];
            let match;
            while ((match = sectionRegex.exec(htmlContent)) !== null) {
                sections.push({ index: match.index });
            }

            const navMatch = navRegex.exec(htmlContent);
            if (!navMatch) {
                throw new Error("Could not find <nav> element.");
            }
            const navIndex = navMatch.index;

            const posts = [];
            for (let i = 0; i < sections.length; i++) {
                const startIndex = sections[i].index;
                const nextIndex = (i + 1 < sections.length) ? sections[i + 1].index : navIndex;
                const sectionContent = htmlContent.substring(startIndex, nextIndex);

                const h2Match = /<h2>(.*?)<\/h2>/i.exec(sectionContent);
                if (h2Match) {
                    const dateStr = h2Match[1].trim();
                    const dateVal = new Date(dateStr);
                    if (!isNaN(dateVal.getTime())) {
                        posts.push({
                            startIndex: startIndex,
                            endIndex: nextIndex,
                            date: dateVal,
                            dateStr: dateStr
                        });
                    }
                }
            }

            let insertIndex = -1;
            for (const post of posts) {
                if (post.date < newDate) {
                    insertIndex = post.startIndex;
                    break;
                }
            }

            if (insertIndex === -1) {
                insertIndex = navIndex;
            }

            const before = htmlContent.substring(0, insertIndex);
            const after = htmlContent.substring(insertIndex);
            return before + newPostHTML + after;
        }
    </script>
</body>

</html>
